<!DOCTYPE html>
<html class="no-js" lang="en">

<head>
  <meta charset="utf-8">
  <meta http-equiv="x-ua-compatible" content="ie=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="author" content="Palanimuthu T">
  <link rel="icon" href="assets\img\icon\Quote.svg">
  <title>Contact | Palanimuthu T</title>

  <link rel="stylesheet" href="assets/css/plugins/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/plugins/fontawesome.min.css">
  <link rel="stylesheet" href="assets/css/plugins/animate.css">
  <link rel="stylesheet" href="assets/css/style.css">

  <style>
    /* ================= FORM ================= */
    .cs_form_field {
      width: 100%;
      padding: 15px;
      border: 1px solid #eee;
      background: #f9f9f9;
      margin-bottom: 20px;
      transition: 0.3s;
    }

    .cs_form_field:focus {
      border-color: #342EAD;
      outline: none;
      background: #fff;
    }

    /* ================= HERO HEIGHT ================= */
    .cs_full_height {
      min-height: 100vh;
      display: flex;
      align-items: center;
    }

    @media (max-width: 768px) {
      .cs_full_height {
        min-height: auto;
        padding: 60px 0;
      }
    }

    /* ================= FORM BOX ================= */
    .cs_form_box {
      padding: 40px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0px 10px 30px rgba(0,0,0,0.05);
    }

    @media (max-width: 768px) {
      .cs_form_box {
        padding: 20px;
      }
    }

    /* ================= CRITICAL FIX (YOUR ISSUE) ================= */
    /* Prevent theme from reversing Bootstrap layout */
    .cs_hero .row {
      flex-direction: row !important;
    }

    @media (max-width: 768px) {
      .cs_hero .row {
        flex-direction: column !important;
      }
    }

    /* ================= SUCCESS OVERLAY ================= */
    #success-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }

    #success-overlay.show {
      display: flex;
    }

    .success-box {
      background: #fff;
      border-radius: 20px;
      padding: 50px 40px;
      text-align: center;
      max-width: 380px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }

    .checkmark-circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #ff6d5a;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }

    .checkmark-circle i {
      color: #fff;
      font-size: 36px;
    }

    .success-close {
      background: #ff6d5a;
      color: #fff;
      border: none;
      padding: 12px 30px;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <!-- SUCCESS -->
  <div id="success-overlay">
    <div class="success-box">
      <div class="checkmark-circle">
        <i class="fas fa-check"></i>
      </div>
      <h3>Message Sent!</h3>
      <button class="success-close" onclick="closeSuccess()">Close</button>
    </div>
  </div>

  <main>

    <section class="cs_hero cs_style_2 cs_filled_bg cs_full_height"
      data-src="assets/img/bg/hero_bg_2.svg">

      <div class="container">
        <div class="row align-items-center g-4">

          <!-- LEFT: TEXT (always first) -->
          <div class="col-12 col-lg-5 order-1 order-lg-1">

            <div class="cs_section_heading cs_style_1">

              <div class="mb-4">
                <a href="index.html" class="cs_font_18 cs_accent_color_2 cs_semi_bold">
                  <i class="fas fa-arrow-left me-2"></i> Back to Home
                </a>
              </div>

              <h2 class="cs_section_title cs_font_48 cs_semi_bold">
                Let's <span class="cs_accent_color">Connect</span>
              </h2>

              <p class="cs_font_18 mt-3">
                Open to opportunities, collaborations, or just a conversation about speech AI and Indian languages
              </p>

              <div class="mt-4">
                <p class="mb-2"><strong>Email:</strong> tpalanimuthu2003@gmail.com</p>
                <p class="mb-0"><strong>Location:</strong> Theni, Tamil Nadu</p>
              </div>

            </div>

          </div>

          <!-- RIGHT: FORM -->
          <div class="col-12 col-lg-6 ms-lg-auto order-2 order-lg-2">

            <div class="cs_form_box">

              <form id="contact-form" action="https://api.web3forms.com/submit" method="POST">

                <input type="hidden" name="access_key"
                  value="e2d8f630-9759-4cd4-87b4-bacd0fdb68c5">

                <input type="text" name="Name" class="cs_form_field" placeholder="Full Name" required>

                <input type="email" name="Email" class="cs_form_field" placeholder="Email Address" required>

                <input type="text" name="Subject" class="cs_form_field" placeholder="Subject">

                <textarea name="Message" rows="4" class="cs_form_field" placeholder="Your Message"
                  required></textarea>

                <button type="submit" class="cs_btn cs_style_1 w-100">
                  <span>Send Message</span>
                </button>

              </form>

            </div>

          </div>

        </div>
      </div>

    </section>

  </main>

  <script>
    const form = document.getElementById('contact-form');

    form.addEventListener('submit', async function (e) {
      e.preventDefault();

      const data = new FormData(form);

      const response = await fetch('https://api.web3forms.com/submit', {
        method: 'POST',
        body: data
      });

      const result = await response.json();

      if (result.success) {
        form.reset();
        document.getElementById('success-overlay').classList.add('show');
      }
    });

    function closeSuccess() {
      document.getElementById('success-overlay').classList.remove('show');
    }
  </script>

</body>
</html>
